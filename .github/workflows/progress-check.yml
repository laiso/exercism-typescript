name: Progress Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  progress-check:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Enable corepack
        run: corepack enable yarn

      - name: Use Node.js 20.x
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 20.x
          cache: 'yarn'

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Count total exercises
        id: total-count
        run: |
          TOTAL=$(find exercises/practice exercises/concept -maxdepth 1 -type d -name "*" | grep -v "^exercises/practice$" | grep -v "^exercises/concept$" | wc -l)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Total exercises: $TOTAL"

      - name: Analyze exercise status
        id: exercise-analysis
        run: |
          IMPLEMENTED=0
          TESTED=0
          PASSED=0
          FAILED=0
          SKIPPED=0
          DETAILED_RESULTS=""
          
          # Get all exercise directories
          EXERCISES=$(find exercises/practice exercises/concept -maxdepth 1 -type d -name "*" | grep -v "^exercises/practice$" | grep -v "^exercises/concept$")
          
          for exercise in $EXERCISES; do
            exercise_name=$(basename "$exercise")
            test_file="$exercise/${exercise_name}.test.ts"
            solution_file="$exercise/${exercise_name}.ts"
            proof_file="$exercise/.meta/proof.ci.ts"
            
            echo "Analyzing $exercise_name..."
            
            # Check implementation status
            if [ -f "$solution_file" ]; then
              IMPLEMENTED=$((IMPLEMENTED + 1))
              DETAILED_RESULTS="$DETAILED_RESULTS\n- $exercise_name: ✅ Implemented"
              
              # Check if testable
              if [ -f "$test_file" ]; then
                TESTED=$((TESTED + 1))
                DETAILED_RESULTS="$DETAILED_RESULTS (testable)"
                
                # Try to run test
                echo "Testing $exercise_name..."
                mkdir -p tmp_test
                cp "$test_file" tmp_test/
                cp "$solution_file" tmp_test/
                cp "$exercise"/package.json tmp_test/ 2>/dev/null || true
                cp "$exercise"/tsconfig.json tmp_test/ 2>/dev/null || true
                cp "$exercise"/jest.config.cjs tmp_test/ 2>/dev/null || true
                cp "$exercise"/babel.config.cjs tmp_test/ 2>/dev/null || true
                
                cd tmp_test
                if yarn test >/dev/null 2>&1; then
                  PASSED=$((PASSED + 1))
                  DETAILED_RESULTS="$DETAILED_RESULTS ✅ PASSED"
                else
                  FAILED=$((FAILED + 1))
                  DETAILED_RESULTS="$DETAILED_RESULTS ❌ FAILED"
                fi
                cd ..
                rm -rf tmp_test
              else
                SKIPPED=$((SKIPPED + 1))
                DETAILED_RESULTS="$DETAILED_RESULTS ⏭️ No test file"
              fi
            else
              SKIPPED=$((SKIPPED + 1))
              DETAILED_RESULTS="$DETAILED_RESULTS\n- $exercise_name: ❌ Not implemented"
            fi
          done
          
          echo "implemented=$IMPLEMENTED" >> $GITHUB_OUTPUT
          echo "tested=$TESTED" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "detailed_results<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DETAILED_RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Implemented: $IMPLEMENTED"
          echo "Tested: $TESTED"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          echo "Skipped: $SKIPPED"

      - name: Calculate progress metrics
        id: progress-metrics
        run: |
          TOTAL=${{ steps.total-count.outputs.total }}
          IMPLEMENTED=${{ steps.exercise-analysis.outputs.implemented }}
          TESTED=${{ steps.exercise-analysis.outputs.tested }}
          PASSED=${{ steps.exercise-analysis.outputs.passed }}
          
          # Implementation progress
          if [ "$TOTAL" -gt 0 ]; then
            IMPLEMENTATION_RATE=$((IMPLEMENTED * 100 / TOTAL))
          else
            IMPLEMENTATION_RATE=0
          fi
          
          # Test success rate
          if [ "$TESTED" -gt 0 ]; then
            SUCCESS_RATE=$((PASSED * 100 / TESTED))
          else
            SUCCESS_RATE=0
          fi
          
          # Overall completion rate
          if [ "$TOTAL" -gt 0 ]; then
            COMPLETION_RATE=$((PASSED * 100 / TOTAL))
          else
            COMPLETION_RATE=0
          fi
          
          echo "implementation_rate=$IMPLEMENTATION_RATE" >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "completion_rate=$COMPLETION_RATE" >> $GITHUB_OUTPUT
          
          echo "Implementation Rate: $IMPLEMENTATION_RATE%"
          echo "Success Rate: $SUCCESS_RATE%"
          echo "Completion Rate: $COMPLETION_RATE%"

      - name: Create detailed progress report
        run: |
          TOTAL=${{ steps.total-count.outputs.total }}
          IMPLEMENTED=${{ steps.exercise-analysis.outputs.implemented }}
          TESTED=${{ steps.exercise-analysis.outputs.tested }}
          PASSED=${{ steps.exercise-analysis.outputs.passed }}
          FAILED=${{ steps.exercise-analysis.outputs.failed }}
          SKIPPED=${{ steps.exercise-analysis.outputs.skipped }}
          IMPLEMENTATION_RATE=${{ steps.progress-metrics.outputs.implementation_rate }}
          SUCCESS_RATE=${{ steps.progress-metrics.outputs.success_rate }}
          COMPLETION_RATE=${{ steps.progress-metrics.outputs.completion_rate }}
          DETAILED_RESULTS="${{ steps.exercise-analysis.outputs.detailed_results }}"
          
          echo "# Detailed Progress Report" > progress-report.md
          echo "" >> progress-report.md
          echo "## Summary Statistics" >> progress-report.md
          echo "- **Total Exercises**: $TOTAL" >> progress-report.md
          echo "- **Implemented**: $IMPLEMENTED ($IMPLEMENTATION_RATE%)" >> progress-report.md
          echo "- **Tested**: $TESTED" >> progress-report.md
          echo "- **Passed**: $PASSED ($SUCCESS_RATE% of tested)" >> progress-report.md
          echo "- **Failed**: $FAILED" >> progress-report.md
          echo "- **Skipped**: $SKIPPED" >> progress-report.md
          echo "- **Overall Completion**: $COMPLETION_RATE%" >> progress-report.md
          echo "" >> progress-report.md
          echo "## Progress Bars" >> progress-report.md
          echo "### Implementation Progress" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "$(printf '█%.0s' $(seq 1 $((IMPLEMENTATION_RATE/5))))$(printf '░%.0s' $(seq 1 $((20-IMPLEMENTATION_RATE/5)))) $IMPLEMENTATION_RATE%" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "" >> progress-report.md
          echo "### Success Rate (of tested)" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "$(printf '█%.0s' $(seq 1 $((SUCCESS_RATE/5))))$(printf '░%.0s' $(seq 1 $((20-SUCCESS_RATE/5)))) $SUCCESS_RATE%" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "" >> progress-report.md
          echo "### Overall Completion" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "$(printf '█%.0s' $(seq 1 $((COMPLETION_RATE/5))))$(printf '░%.0s' $(seq 1 $((20-COMPLETION_RATE/5)))) $COMPLETION_RATE%" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "" >> progress-report.md
          echo "## Detailed Results" >> progress-report.md
          echo "$DETAILED_RESULTS" >> progress-report.md

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: progress-report
          path: progress-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = ${{ steps.total-count.outputs.total }};
            const implemented = ${{ steps.exercise-analysis.outputs.implemented }};
            const tested = ${{ steps.exercise-analysis.outputs.tested }};
            const passed = ${{ steps.exercise-analysis.outputs.passed }};
            const failed = ${{ steps.exercise-analysis.outputs.failed }};
            const skipped = ${{ steps.exercise-analysis.outputs.skipped }};
            const implementationRate = ${{ steps.progress-metrics.outputs.implementation_rate }};
            const successRate = ${{ steps.progress-metrics.outputs.success_rate }};
            const completionRate = ${{ steps.progress-metrics.outputs.completion_rate }};
            
            const message = `## 📊 Progress Check Results
            
            ### Summary
            - **Total Exercises**: ${total}
            - **Implemented**: ${implemented} (${implementationRate}%)
            - **Tested**: ${tested}
            - **Passed**: ${passed} (${successRate}% of tested)
            - **Failed**: ${failed}
            - **Skipped**: ${skipped}
            - **Overall Completion**: ${completionRate}%
            
            ### Key Metrics
            - 🎯 **Implementation Progress**: ${implementationRate}%
            - ✅ **Success Rate**: ${successRate}%
            - 🏆 **Overall Completion**: ${completionRate}%
            
            ${completionRate >= 80 ? '🎉 Excellent progress!' : completionRate >= 50 ? '👍 Good progress!' : '💪 Keep going!'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            }); 