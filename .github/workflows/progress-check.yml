name: Progress Check

on:
  push:
    branches: 
      - "**"
  
jobs:
  progress-check:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
        with:
          fetch-depth: 0  # Needed for comparison with patch branch
          
      - name: Fetch base branch for comparison
        run: |
          echo "Fetching patch branch for comparison..."
          git fetch origin patch:patch || echo "patch branch not found"

      - name: Enable corepack
        run: corepack enable yarn

      - name: Use Node.js 20.x
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
        with:
          node-version: 20.x
          cache: 'yarn'

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Get changed files and analyze implementation
        id: git-analysis
        run: |
          echo "📊 Analyzing implementation based on Git changes..."
          
          # Compare with base branch
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            echo "Comparing with PR base: $BASE_REF"
          else
            # For push, compare with patch branch
            if git rev-parse --verify patch >/dev/null 2>&1; then
              BASE_REF="patch"
              echo "Comparing with patch branch: $BASE_REF"
            else
              BASE_REF="HEAD~1" 
              echo "patch branch not found, comparing with previous commit: $BASE_REF"
            fi
          fi
          
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $BASE_REF HEAD | grep -E "exercises/.+\.ts$" | grep -v "\.test\.ts$" || true)
          DELETED_FILES=$(git diff --diff-filter=D --name-only $BASE_REF HEAD | grep -E "exercises/.+\.ts$" | grep -v "\.test\.ts$" || true)
          ADDED_FILES=$(git diff --diff-filter=A --name-only $BASE_REF HEAD | grep -E "exercises/.+\.ts$" | grep -v "\.test\.ts$" || true)
          MODIFIED_FILES=$(git diff --diff-filter=M --name-only $BASE_REF HEAD | grep -E "exercises/.+\.ts$" | grep -v "\.test\.ts$" || true)
          
                     echo "Changed solution files: $(echo "$CHANGED_FILES" | wc -l) files"
          
          # Get all exercise directories
          ALL_EXERCISES=$(find exercises/practice exercises/concept -maxdepth 1 -type d -name "*" | grep -v "^exercises/practice$" | grep -v "^exercises/concept$")
          TOTAL_EXERCISES=$(echo "$ALL_EXERCISES" | wc -l)
          
          # Stats variables
          IMPLEMENTED=0
          NEWLY_IMPLEMENTED=0
          MODIFIED_IMPLEMENTATIONS=0
          DELETED_IMPLEMENTATIONS=0
          STUB_ONLY=0
          
          # Analyze changed files
                     for file in $CHANGED_FILES; do
             if [ -f "$file" ]; then
               # Check file contents
               line_count=$(wc -l < "$file" 2>/dev/null || echo "0")
               has_logic=$(grep -cE "(if|for|while|function|class|=|return)" "$file" 2>/dev/null || echo "0")
              
              if [ "$line_count" -gt 5 ] && [ "$has_logic" -gt 2 ]; then
                                 if echo "$ADDED_FILES" | grep -q "$file"; then
                   NEWLY_IMPLEMENTED=$((NEWLY_IMPLEMENTED + 1))
                 elif echo "$MODIFIED_FILES" | grep -q "$file"; then
                   MODIFIED_IMPLEMENTATIONS=$((MODIFIED_IMPLEMENTATIONS + 1))
                 fi
                 IMPLEMENTED=$((IMPLEMENTED + 1))
               else
                 STUB_ONLY=$((STUB_ONLY + 1))
               fi
            fi
          done
          
                     # Deleted files
           for file in $DELETED_FILES; do
             DELETED_IMPLEMENTATIONS=$((DELETED_IMPLEMENTATIONS + 1))
           done
          
          # Check overall implementation status (including unchanged files)
          TOTAL_IMPLEMENTED=0
          TOTAL_STUB_ONLY=0
          
          for exercise in $ALL_EXERCISES; do
            exercise_name=$(basename "$exercise")
            solution_file="$exercise/${exercise_name}.ts"
            
            if [ -f "$solution_file" ]; then
              line_count=$(wc -l < "$solution_file" 2>/dev/null || echo "0")
              has_logic=$(grep -cE "(if|for|while|function|class|=|return)" "$solution_file" 2>/dev/null || echo "0")
              
              if [ "$line_count" -gt 5 ] && [ "$has_logic" -gt 2 ]; then
                TOTAL_IMPLEMENTED=$((TOTAL_IMPLEMENTED + 1))
              else
                TOTAL_STUB_ONLY=$((TOTAL_STUB_ONLY + 1))
              fi
            fi
          done
          
          # Number of changed files
          CHANGED_COUNT=$(echo "$CHANGED_FILES" | grep -c . || echo "0")
          
          # Output
          echo "total_exercises=$TOTAL_EXERCISES" >> $GITHUB_OUTPUT
          echo "changed_files_count=$CHANGED_COUNT" >> $GITHUB_OUTPUT
          echo "newly_implemented=$NEWLY_IMPLEMENTED" >> $GITHUB_OUTPUT
          echo "modified_implementations=$MODIFIED_IMPLEMENTATIONS" >> $GITHUB_OUTPUT
          echo "deleted_implementations=$DELETED_IMPLEMENTATIONS" >> $GITHUB_OUTPUT
          echo "total_implemented=$TOTAL_IMPLEMENTED" >> $GITHUB_OUTPUT
          echo "total_stub_only=$TOTAL_STUB_ONLY" >> $GITHUB_OUTPUT
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "📊 Git-based Analysis Summary:"
          echo "  Total exercises: $TOTAL_EXERCISES"
          echo "  Changed files: $CHANGED_COUNT"
          echo "  Newly implemented: $NEWLY_IMPLEMENTED"
          echo "  Modified implementations: $MODIFIED_IMPLEMENTATIONS"
          echo "  Deleted implementations: $DELETED_IMPLEMENTATIONS"
          echo "  Total implemented: $TOTAL_IMPLEMENTED"
          echo "  Total stub only: $TOTAL_STUB_ONLY"

      - name: Test all implemented exercises
        id: test-all
        run: |
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_TESTED=0
          
          echo "🧪 Testing all implemented exercises..."
          
          # Get all exercise directories
          ALL_EXERCISES=$(find exercises/practice exercises/concept -maxdepth 1 -type d -name "*" | grep -v "^exercises/practice$" | grep -v "^exercises/concept$")
          
          for exercise in $ALL_EXERCISES; do
            exercise_name=$(basename "$exercise")
            test_file="$exercise/${exercise_name}.test.ts"
            solution_file="$exercise/${exercise_name}.ts"
            
            # Only test if both files exist and solution is implemented
            if [ -f "$test_file" ] && [ -f "$solution_file" ]; then
              line_count=$(wc -l < "$solution_file" 2>/dev/null || echo "0")
              has_logic=$(grep -cE "(if|for|while|function|class|=|return)" "$solution_file" 2>/dev/null || echo "0")
              
              # Only test if it's actually implemented (not just a stub)
              if [ "$line_count" -gt 5 ] && [ "$has_logic" -gt 2 ]; then
                TOTAL_TESTED=$((TOTAL_TESTED + 1))
                
                mkdir -p tmp_test
                
                # Copy all necessary files
                cp "$test_file" tmp_test/
                cp "$solution_file" tmp_test/
                cp "$exercise"/package.json tmp_test/ 2>/dev/null || cp common/package.json tmp_test/
                cp "$exercise"/yarn.lock tmp_test/ 2>/dev/null || true
                cp "$exercise"/.yarnrc.yml tmp_test/ 2>/dev/null || cp .yarnrc.yml tmp_test/ 2>/dev/null || true
                cp "$exercise"/tsconfig.json tmp_test/ 2>/dev/null || cp common/tsconfig.json tmp_test/
                cp "$exercise"/jest.config.cjs tmp_test/ 2>/dev/null || cp common/jest.config.cjs tmp_test/
                cp "$exercise"/babel.config.cjs tmp_test/ 2>/dev/null || cp common/babel.config.cjs tmp_test/
                cp "$exercise"/test-runner.mjs tmp_test/ 2>/dev/null || true
                
                cd tmp_test
                if yarn install --no-immutable >/dev/null 2>&1; then
                  if timeout 30 yarn jest --passWithNoTests >/dev/null 2>&1; then
                    TOTAL_PASSED=$((TOTAL_PASSED + 1))
                    echo "✅ $exercise_name"
                  else
                    if timeout 30 yarn test >/dev/null 2>&1; then
                      TOTAL_PASSED=$((TOTAL_PASSED + 1))
                      echo "✅ $exercise_name"
                    else
                      TOTAL_FAILED=$((TOTAL_FAILED + 1))
                      echo "❌ $exercise_name"
                    fi
                  fi
                else
                  TOTAL_FAILED=$((TOTAL_FAILED + 1))
                  echo "❌ $exercise_name (deps failed)"
                fi
                cd ..
                rm -rf tmp_test
              fi
            fi
          done
          
          echo "total_tested=$TOTAL_TESTED" >> $GITHUB_OUTPUT
          echo "total_passed=$TOTAL_PASSED" >> $GITHUB_OUTPUT
          echo "total_failed=$TOTAL_FAILED" >> $GITHUB_OUTPUT

      - name: Calculate progress metrics
        id: progress-metrics
        run: |
          TOTAL=${{ steps.git-analysis.outputs.total_exercises }}
          TOTAL_IMPLEMENTED=${{ steps.git-analysis.outputs.total_implemented }}
          TOTAL_PASSED=${{ steps.test-all.outputs.total_passed }}
          
          # Implementation rate
          if [ "$TOTAL" -gt 0 ]; then
            IMPLEMENTATION_RATE=$((TOTAL_IMPLEMENTED * 100 / TOTAL))
          else
            IMPLEMENTATION_RATE=0
          fi
          
          # Overall pass rate
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$((TOTAL_PASSED * 100 / TOTAL))
          else
            PASS_RATE=0
          fi
          
          echo "implementation_rate=$IMPLEMENTATION_RATE" >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          
          echo "📈 Progress Summary:"
          echo "  📚 Total Exercises: $TOTAL"
          echo "  ✅ Implemented: $TOTAL_IMPLEMENTED ($IMPLEMENTATION_RATE%)"
          echo "  🎯 Passed Tests: $TOTAL_PASSED ($PASS_RATE%)"

      - name: Create progress report
        run: |
          TOTAL=${{ steps.git-analysis.outputs.total_exercises }}
          TOTAL_IMPLEMENTED=${{ steps.git-analysis.outputs.total_implemented }}
          TOTAL_PASSED=${{ steps.test-all.outputs.total_passed }}
          TOTAL_FAILED=${{ steps.test-all.outputs.total_failed }}
          IMPLEMENTATION_RATE=${{ steps.progress-metrics.outputs.implementation_rate }}
          PASS_RATE=${{ steps.progress-metrics.outputs.pass_rate }}
          
          echo "# Exercism TypeScript Progress Report" > progress-report.md
          echo "" >> progress-report.md
          echo "## 📊 Summary" >> progress-report.md
          echo "- **Total Exercises**: $TOTAL" >> progress-report.md
          echo "- **Implemented**: $TOTAL_IMPLEMENTED ($IMPLEMENTATION_RATE%)" >> progress-report.md
          echo "- **Tests Passed**: $TOTAL_PASSED ($PASS_RATE%)" >> progress-report.md
          echo "- **Tests Failed**: $TOTAL_FAILED" >> progress-report.md
          echo "" >> progress-report.md
          echo "## 📈 Progress Bar" >> progress-report.md
          echo "\`\`\`" >> progress-report.md
          echo "Implementation: $(printf '█%.0s' $(seq 1 $((IMPLEMENTATION_RATE/5))))$(printf '░%.0s' $(seq 1 $((20-IMPLEMENTATION_RATE/5)))) $IMPLEMENTATION_RATE%" >> progress-report.md
          echo "Pass Rate:     $(printf '█%.0s' $(seq 1 $((PASS_RATE/5))))$(printf '░%.0s' $(seq 1 $((20-PASS_RATE/5)))) $PASS_RATE%" >> progress-report.md
          echo "\`\`\`" >> progress-report.md

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: exercism-progress-report
          path: progress-report.md 