name: "Codex [reusable action]"
description: "A reusable action that runs a Codex model."

inputs:
  openai_api_key:
    description: "The value to use as the OPENAI_API_KEY environment variable when running Codex."
    required: true
  trigger_phrase:
    description: "Text to trigger Codex from a PR/issue body or comment."
    required: false
    default: ""
  github_token:
    description: "Token so Codex can comment on the PR or issue."
    required: true
  codex_args:
    description: "A whitespace-delimited list of arguments to pass to Codex. Due to limitations in YAML, arguments with spaces are not supported. For more complex configurations, use the `codex_home` input."
    required: false
    default: "--config hide_agent_reasoning=true --full-auto"
  codex_home:
    description: "Value to use as the CODEX_HOME environment variable when running Codex."
    required: false
  codex_release_tag:
    description: "The release tag of the Codex model to run, e.g., 'rust-v0.3.0'. Defaults to the latest release."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # Do this in Bash so we do not even bother to install Bun if the sender does
    # not have write access to the repo.
    - name: Verify user has write access to the repo.
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        set -euo pipefail

        PERMISSION=$(gh api \
          "/repos/${GITHUB_REPOSITORY}/collaborators/${{ github.event.sender.login }}/permission" \
          | jq -r '.permission')

        if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
          exit 1
        fi

    - name: Download Codex
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        set -euo pipefail

        # Determine OS/arch and corresponding Codex artifact name.
        uname_s=$(uname -s)
        uname_m=$(uname -m)

        case "$uname_s" in
          Linux*)   os="linux" ;;
          Darwin*)  os="apple-darwin" ;;
          *) echo "Unsupported operating system: $uname_s"; exit 1 ;;
        esac

        case "$uname_m" in
          x86_64*) arch="x86_64" ;;
          arm64*|aarch64*) arch="aarch64" ;;
          *) echo "Unsupported architecture: $uname_m"; exit 1 ;;
        esac

        # linux builds differentiate between musl and gnu.
        if [[ "$os" == "linux" ]]; then
          if [[ "$arch" == "x86_64" ]]; then
            triple="${arch}-unknown-linux-musl"
          else
            # Only other supported linux build is aarch64 gnu.
            triple="${arch}-unknown-linux-gnu"
          fi
        else
          # macOS
          triple="${arch}-apple-darwin"
        fi

        # Note that if we start baking version numbers into the artifact name,
        # we will need to update this action.yml file to match.
        # Candidate triples (prefer musl if available, then fall back to gnu)
        candidates=("$triple")
        if [[ "$os" == "linux" && "$arch" == "x86_64" ]]; then
          # Ensure both musl and gnu are attempted if initial chosen one fails.
            if [[ "$triple" == "x86_64-unknown-linux-musl" ]]; then
              candidates+=("x86_64-unknown-linux-gnu")
            else
              candidates+=("x86_64-unknown-linux-musl")
            fi
        fi

        TAG_ARG="${{ inputs.codex_release_tag }}"
        succeeded="false"
        for cand in "${candidates[@]}"; do
          artifact="codex-${cand}.tar.gz"
          echo "Attempting to download artifact: $artifact"
          if gh release download ${TAG_ARG:+$TAG_ARG} --repo openai/codex --pattern "$artifact" --output codex-download.tar.gz; then
            if [[ ! -s codex-download.tar.gz ]]; then
              echo "Downloaded file is empty for $artifact; trying next candidate" >&2
              continue
            fi
            # Extract single binary to /usr/local/bin/codex
            tar -xzf codex-download.tar.gz -O > /usr/local/bin/codex || { echo "Extraction failed for $artifact" >&2; continue; }
            chmod +x /usr/local/bin/codex || true
            succeeded="true"
            break
          else
            echo "Download failed for $artifact" >&2
          fi
        done

        if [[ "$succeeded" != "true" || ! -x /usr/local/bin/codex ]]; then
          echo "Failed to obtain Codex binary after trying: ${candidates[*]}" >&2
          ls -l /usr/local/bin || true
          exit 1
        fi

        echo "Codex binary details:";
        ls -l /usr/local/bin/codex || true
        file /usr/local/bin/codex || true
        (command -v sha256sum && sha256sum /usr/local/bin/codex) || true
        # Display version (may fail if incompatible binary)
        /usr/local/bin/codex --version || { echo "Warning: failed to get Codex version" >&2; }

    - name: Debug Codex binary and config
      shell: bash
      env:
        INPUT_CODEX_HOME: ${{ inputs.codex_home || ''}}
      run: |
        set -euo pipefail
        echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
        echo "---- Codex help/version ----"
        /usr/local/bin/codex --help || true
        /usr/local/bin/codex --version || true
        /usr/local/bin/codex exec --help || true
        echo "---- .github/codex tree ----"
        ls -laR "${GITHUB_WORKSPACE}/.github/codex" || echo "No .github/codex directory"
        echo "---- Resolve CODEX_HOME (if provided) ----"
        if [[ -n "${INPUT_CODEX_HOME}" ]]; then
          if [[ "${INPUT_CODEX_HOME}" = /* ]]; then
            HOME_DIR="${INPUT_CODEX_HOME}"
          else
            # Trim leading ./ if present when constructing path
            HOME_DIR="${GITHUB_WORKSPACE}/${INPUT_CODEX_HOME#./}"
          fi
          echo "INPUT_CODEX_HOME=${INPUT_CODEX_HOME}"
          echo "Resolved CODEX_HOME=${HOME_DIR}"
          ls -la "${HOME_DIR}" || echo "Resolved CODEX_HOME missing"
          echo "---- CODEX_HOME contents ----"
          ls -laR "${HOME_DIR}" || true
        else
          echo "INPUT_CODEX_HOME not provided"
        fi

    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.11

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --production

    - name: Run Codex
      shell: bash
      run: bun run ${{ github.action_path }}/src/main.ts
      # Process args plus environment variables often have a max of 128 KiB,
      # so we should fit within that limit?
      env:
        INPUT_CODEX_ARGS: ${{ inputs.codex_args || '' }}
        INPUT_CODEX_HOME: ${{ inputs.codex_home || ''}}
        INPUT_TRIGGER_PHRASE: ${{ inputs.trigger_phrase || '' }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}
        GITHUB_EVENT_LABEL_NAME: ${{ github.event.label.name || '' }}
        GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        GITHUB_EVENT_ISSUE_BODY: ${{ github.event.issue.body || '' }}
        GITHUB_EVENT_REVIEW_BODY: ${{ github.event.review.body || '' }}
        GITHUB_EVENT_COMMENT_BODY: ${{ github.event.comment.body || '' }}
